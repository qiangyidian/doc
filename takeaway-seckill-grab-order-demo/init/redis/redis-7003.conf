# 当前 Redis 实例监听的端口。
port 7003

# 关闭保护模式，方便本地容器互联。
protected-mode no

# 允许容器内部网络访问。
bind 0.0.0.0

# 开启集群模式。
cluster-enabled yes

# 当前节点的集群元数据文件。
cluster-config-file nodes-7003.conf

# 集群节点超时时间，单位毫秒。
cluster-node-timeout 5000

# 集群总线端口，通常就是普通端口 + 10000。
cluster-announce-bus-port 17003

# 这里开启 AOF，方便你观察数据持久化。
appendonly yes

# 数据目录。
dir /data

# 你的原文里提到了防脑裂配置，这里按原文保留。
min-replicas-to-write 1
min-replicas-max-lag 10